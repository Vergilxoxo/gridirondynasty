<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Time Single Week Scoring Records</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="league-container">
  <div class="league-header">
    <h1>All Time Single Week Scoring Rekords</h1>
    <p>Top 10 Wochenpunkte aller Zeiten</p>
  </div>

  <div class="records-grid" id="records-grid">
    <!-- Dynamisch eingefügt -->
  </div>
</div>

<script>
  // League IDs
  const leagueIds = {
    "2026":"1311998228123643904",
    "2025":"1207768406841892864",
    "2024":"1042445037713334272"
  };

  // Owner Map (Roster ID → Owner Name)
  const ownerMap = {
    "1": "Ralf",
    "2": "TitleTownPat",
    "3": "MrNilsson",
    "4": "kleinerlouis",
    "5": "Ulle",
    "6": "TST1860",
    "7": "brab97",
    "8": "Himp84",
    "9": "TobiWalonso",
    "10": "49erflo",
    "11": "Heesy",
    "12": "CrazyGringo"
  };

  // Matchups für eine Liga abrufen
  async function fetchMatchups(leagueId) {
    const res = await fetch(`https://api.sleeper.app/v1/league/${leagueId}/matchups`);
    return res.json();
  }

  // Alle Top-Records zusammenstellen
  async function getTopRecords() {
    let allRecords = [];

    for (const year in leagueIds) {
      const leagueId = leagueIds[year];
      const matchups = await fetchMatchups(leagueId);

      matchups.forEach(m => {
        const rosterId = m.roster_id.toString(); // Roster ID als String
        const owner = ownerMap[rosterId] || "Unknown";

        allRecords.push({
          owner: owner,
          points: m.points,
          week: m.week,
          year: year
        });
      });
    }

    // Top 10 nach Punkten
    allRecords.sort((a,b) => b.points - a.points);
    return allRecords.slice(0, 10);
  }

  // Records rendern
  async function renderRecords() {
    const grid = document.getElementById("records-grid");
    grid.innerHTML = "Lade Daten...";

    const topRecords = await getTopRecords();
    grid.innerHTML = "";

    topRecords.forEach(r => {
      const card = document.createElement("div");
      card.className = "records-card";
      card.innerHTML = `
        <div class="title">Woche ${r.week}, ${r.year}</div>
        <div class="points">${r.points.toFixed(2)}</div>
        <div class="owner">${r.owner}</div>
      `;
      grid.appendChild(card);
    });
  }

  // Seite laden
  renderRecords();
</script>

</body>
</html>
