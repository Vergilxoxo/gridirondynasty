<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sleeper Season Leaders</title>

<style>

body{
font-family:Arial;
background:#f5f6fa;
padding:30px;
}

h1{
margin-bottom:20px;
}

.controls{
margin-bottom:20px;
}

select,button{
padding:8px;
margin-right:10px;
}

table{
border-collapse:collapse;
width:800px;
background:white;
}

th,td{
padding:8px;
border:1px solid #ddd;
}

th{
background:#222;
color:white;
}

</style>
</head>

<body>

<h1>Sleeper Season Leaders</h1>

<div class="controls">

Season:
<select id="season">
<option>2023</option>
<option>2022</option>
<option>2021</option>
</select>

Position:
<select id="position">
<option value="ALL">Alle</option>
<option value="QB">QB</option>
<option value="RB">RB</option>
<option value="WR">WR</option>
<option value="TE">TE</option>
<option value="K">K</option>
<option value="LB">LB</option>
<option value="DB">DB</option>
<option value="DL">DL</option>
</select>

<button onclick="loadSeason()">Stats laden</button>

</div>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Team</th>
<th>Position</th>
<th>Punkte</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

async function loadSeason(){

console.clear();
console.log("Start loading season");

const season=document.getElementById("season").value;
const positionFilter=document.getElementById("position").value;

const weeks=18;

const players=await fetch("https://api.sleeper.app/v1/players/nfl")
.then(r=>r.json());

console.log("Players loaded");

let totals={};

for(let week=1;week<=weeks;week++){

try{

console.log("Loading week",week);

const res=await fetch(`https://api.sleeper.app/v1/stats/nfl/${season}/${week}`);

if(!res.ok){
console.log("Week skipped:",week);
continue;
}

const stats=await res.json();

for(const id in stats){

const stat=stats[id];

const pts=
stat.fantasy_points ||
stat.pts_ppr ||
stat.pts_half_ppr ||
stat.pts_std ||
0;

if(!totals[id]) totals[id]=0;

totals[id]+=pts;

}

}catch(e){

console.log("Error week",week,e);

}

}

let results=[];

for(const id in totals){

if(totals[id]<=0) continue;

const player=players[id];

if(!player) continue;

if(positionFilter!=="ALL" && player.position!==positionFilter) continue;

results.push({

name:player.full_name,
team:player.team || "-",
position:player.position,
points:totals[id]

});

}

results.sort((a,b)=>b.points-a.points);

const table=document.getElementById("tableBody");
table.innerHTML="";

results.slice(0,200).forEach((p,i)=>{

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.team}</td>
<td>${p.position}</td>
<td>${p.points.toFixed(2)}</td>
</tr>
`;

});

console.log("Finished loading");

}

</script>

</body>
</html>
