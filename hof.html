<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Champion Card Test</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🏆 Hall of Fame</h1>

<div class="champion-grid">

  <!-- Champion 2024 -->
  <div class="champion-card">

    <div class="champion-header">
      🏆 Dynasty Champion 2024
    </div>

    <div class="champion-body">

      <h2 class="champion-team">DakStreet Boys</h2>
      <p class="champion-manager">Manager: brab97</p>

      <div class="champion-heroes">

        <div class="hero">
          <img src="https://sleepercdn.com/content/nfl/players/thumb/6794.jpg">
          <span>Jefferson</span>
        </div>

        <div class="hero">
          <img src="https://via.placeholder.com/46">
          <span>CMC</span>
        </div>

        <div class="hero">
          <img src="https://via.placeholder.com/46">
          <span>Hill</span>
        </div>

      </div>

      <div class="champion-stats">

        <div>
          <strong>Final</strong>
          <span>168-150</span>
        </div>

        <div>
          <strong>Record</strong>
          <span>11-3</span>
        </div>

      </div>

    </div>

  </div>

  <!-- Champion 2025 -->
  <div class="champion-card">

    <div class="champion-header">
      🏆 Dynasty Champion 2025
    </div>

    <div class="champion-body">

      <h2 class="champion-team">DakStreet Boys</h2>
      <p class="champion-manager">Manager: brab97</p>

      <div class="champion-heroes">

        <div class="hero">
          <img src="https://via.placeholder.com/46">
          <span>Mahomes</span>
        </div>

        <div class="hero">
          <img src="https://via.placeholder.com/46">
          <span>CMC</span>
        </div>

        <div class="hero">
          <img src="https://via.placeholder.com/46">
          <span>Hill</span>
        </div>

      </div>

      <div class="champion-stats">

        <div>
          <strong>Final</strong>
          <span>168-150</span>
        </div>

        <div>
          <strong>Record</strong>
          <span>11-3</span>
        </div>

      </div>

    </div>

  </div>

</div>

</body>
</html>
