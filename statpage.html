<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sleeper Season Leaders</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:30px;
}

button,select{
padding:8px;
margin-right:10px;
}

#status{
margin:10px 0;
font-weight:bold;
}

table{
border-collapse:collapse;
width:900px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#222;
color:white;
}

</style>

</head>

<body>

<h1>Sleeper Season Leaderboard</h1>

Season:
<select id="season">
<option value="2023">2023</option>
<option value="2022">2022</option>
<option value="2021">2021</option>
</select>

Position:
<select id="position">
<option value="ALL">Alle</option>
<option>QB</option>
<option>RB</option>
<option>WR</option>
<option>TE</option>
<option>K</option>
<option>LB</option>
<option>DB</option>
<option>DL</option>
</select>

<button onclick="loadSeason()">Stats laden</button>

<div id="status"></div>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Team</th>
<th>Position</th>
<th>Punkte</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

async function loadSeason(){

const season=document.getElementById("season").value;
const posFilter=document.getElementById("position").value;
const status=document.getElementById("status");

status.innerText="Lade Spieler...";

const players=await fetch("https://api.sleeper.app/v1/players/nfl")
.then(r=>r.json());

status.innerText="Lade Wochenstats...";

let totals={};

for(let week=1;week<=18;week++){

status.innerText="Lade Woche "+week;

try{

const res=await fetch(`https://api.sleeper.app/v1/stats/nfl/${season}/${week}`);

if(!res.ok) continue;

const stats=await res.json();

for(const id in stats){

const stat=stats[id];

const pts =
stat.fantasy_points ??
stat.pts_ppr ??
stat.pts_half_ppr ??
stat.pts_std ??
0;

if(!totals[id]) totals[id]=0;

totals[id]+=pts;

}

}catch(e){
console.log("Week error",week);
}

}

status.innerText="Baue Tabelle...";

let list=[];

for(const id in totals){

const player=players[id];

if(!player) continue;

if(posFilter!=="ALL" && player.position!==posFilter) continue;

list.push({

name:player.full_name,
team:player.team || "-",
position:player.position,
points:totals[id]

});

}

list.sort((a,b)=>b.points-a.points);

const table=document.getElementById("tableBody");
table.innerHTML="";

list.slice(0,200).forEach((p,i)=>{

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.team}</td>
<td>${p.position}</td>
<td>${p.points.toFixed(2)}</td>
</tr>
`;

});

status.innerText="Fertig! "+list.length+" Spieler gefunden";

}

</script>

</body>
</html>
