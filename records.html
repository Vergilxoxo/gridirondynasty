<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Time Single Week Scoring Records</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="league-container">
  <div class="league-header">
    <h1>All Time Single Week Scoring Rekords</h1>
    <p>Top 10 Wochenpunkte aller Zeiten</p>
  </div>

  <div class="records-card records-ranking">

  <div class="records-table">

    <div class="records-header">
      <span>#</span>
      <span>Manager</span>
      <span>Week</span>
      <span>Points</span>
    </div>

    <div id="records-list"></div>

  </div>

</div>

<script>

const leagueIds = {
  "2026":"1311998228123643904",
  "2025":"1207768406841892864",
  "2024":"1042445037713334272"
};

// Owner Map (Roster → Owner)
const ownerMap = {
  "1": "Ralf",
  "2": "TitleTownPat",
  "3": "MrNilsson",
  "4": "kleinerlouis",
  "5": "Ulle",
  "6": "TST1860",
  "7": "brab97",
  "8": "Himp84",
  "9": "TobiWalonso",
  "10": "49erflo",
  "11": "Heesy",
  "12": "CrazyGringo"
};

async function fetchWeekMatchups(leagueId, week) {
  const res = await fetch(`https://api.sleeper.app/v1/league/${leagueId}/matchups/${week}`);
  return res.json();
}

async function getAllRecords() {

  const allRecords = [];

  for (const year in leagueIds) {

    const leagueId = leagueIds[year];

    for (let week = 1; week <= 18; week++) {

      try {

        const matchups = await fetchWeekMatchups(leagueId, week);

        if (!matchups || matchups.length === 0) continue;

        matchups.forEach(team => {

          const owner = ownerMap[team.roster_id] || "Unknown";

          allRecords.push({
            owner: owner,
            points: team.points || 0,
            week: week,
            year: year
          });

        });

      } catch (err) {
        console.error("Week error", week, err);
      }

    }

  }

  // Sortieren nach Punkten
  allRecords.sort((a,b) => b.points - a.points);

  return allRecords.slice(0,10);

}

async function renderRecords() {

  const list = document.getElementById("records-list");
  const records = await getAllRecords();

  list.innerHTML = "";

  records.forEach((r, index) => {

    const row = document.createElement("div");
    row.className = "records-row";

    row.innerHTML = `
      <div class="rank">${index + 1}</div>
      <div class="owner">${r.owner}</div>
      <div class="week">W${r.week} • ${r.year}</div>
      <div class="points">${r.points.toFixed(2)}</div>
    `;

    list.appendChild(row);

  });

}

renderRecords();

</script>

</body>
</html>
