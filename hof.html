<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Champion Card Test</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏆 Hall of Fame</h1>

<div class="champion-grid">

  <!-- Champion 2024 -->
  <div class="champion-card">
    <div class="champion-header">🏆 Dynasty Champion 2024</div>
    <div class="champion-body">
      <h2 class="champion-team">DakStreet Boys</h2>
      <p class="champion-manager">Manager: brab97</p>

      <div class="champion-heroes">
        <div class="hero">
          <img src="https://sleepercdn.com/content/nfl/players/thumb/6794.jpg" alt="Jefferson">
          <span>Jefferson</span>
        </div>
        <div class="hero">
          <img src="https://via.placeholder.com/46" alt="CMC">
          <span>CMC</span>
        </div>
        <div class="hero">
          <img src="https://via.placeholder.com/46" alt="Hill">
          <span>Hill</span>
        </div>
      </div>

      <div class="champion-stats">
        <div class="stat">
          <strong>Final</strong>
          <span>351.66 - 261.82</span>
        </div>
        <div class="stat">
          <strong>Record</strong>
          <span>18-10</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Champion 2025 -->
  <div class="champion-card">
    <div class="champion-header">🏆 Dynasty Champion 2025</div>
    <div class="champion-body">
      <h2 class="champion-team">Alles oder Penix</h2>
      <p class="champion-manager">Manager: 49erflo</p>

      <div class="champion-heroes">
        <div class="hero">
          <img src="https://via.placeholder.com/46" alt="Mahomes">
          <span>Mahomes</span>
        </div>
        <div class="hero">
          <img src="https://via.placeholder.com/46" alt="CMC">
          <span>CMC</span>
        </div>
        <div class="hero">
          <img src="https://via.placeholder.com/46" alt="Hill">
          <span>Hill</span>
        </div>
      </div>

      <div class="champion-stats">
        <div class="stat">
          <strong>Final</strong>
          <span>227.76 - 199.16</span>
        </div>
        <div class="stat">
          <strong>Record</strong>
          <span>19-9</span>
        </div>
      </div>
    </div>
  </div>

</div>

</body>
</html>
