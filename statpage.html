<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Sleeper Liga Leaderboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:30px;
}

button{
padding:8px 12px;
margin-bottom:15px;
}

table{
border-collapse:collapse;
width:900px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#222;
color:white;
}

</style>
</head>

<body>

<h1>Top Spieler meiner Sleeper Liga</h1>

<button onclick="loadLeaders()">Leaderboard laden</button>

<div id="status"></div>

<table>

<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Team</th>
<th>Position</th>
<th>Punkte</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const leagueId="1207768406841892864";
const seasonWeeks=18;

async function loadLeaders(){

const status=document.getElementById("status");
status.innerText="Lade Spieler...";

const players=await fetch("https://api.sleeper.app/v1/players/nfl")
.then(r=>r.json());

let totals={};

for(let week=1;week<=seasonWeeks;week++){

status.innerText="Lade Woche "+week;

try{

const res=await fetch(`https://api.sleeper.app/v1/league/${leagueId}/matchups/${week}`);

if(!res.ok) continue;

const matchups=await res.json();

matchups.forEach(team=>{

const points=team.players_points || {};

for(const playerId in points){

if(!totals[playerId]) totals[playerId]=0;

totals[playerId]+=points[playerId];

}

});

}catch(e){

console.log("Fehler Woche",week);

}

}

status.innerText="Berechne Ranking...";

let list=[];

for(const id in totals){

const player=players[id];

if(!player) continue;

list.push({

name:player.full_name,
team:player.team || "-",
position:player.position,
points:totals[id]

});

}

list.sort((a,b)=>b.points-a.points);

const table=document.getElementById("tableBody");
table.innerHTML="";

list.slice(0,200).forEach((p,i)=>{

table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.team}</td>
<td>${p.position}</td>
<td>${p.points.toFixed(2)}</td>
</tr>
`;

});

status.innerText="Fertig!";

}

</script>

</body>
</html>
