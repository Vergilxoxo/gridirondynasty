<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Roster Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Roster Builder</h1>

<!-- Roster Auswahl -->
<div class="filter-container roster-filter">

<label for="roster-select">Roster:</label>

<select id="roster-select">
<option value="1">Ralf</option>
<option value="2">TitleTownPat</option>
<option value="3">MrNilsson</option>
<option value="4">kleinerlouis</option>
<option value="5">Ulle</option>
<option value="6">TST1860</option>
<option value="7">brab97</option>
<option value="8">Himp84</option>
<option value="9">TobiWalonso</option>
<option value="10">49erflo</option>
<option value="11">Heesy</option>
<option value="12">CrazyGringo</option>
</select>

</div>

<!-- Salary Cap Block -->
<div id="salary-cap-block"></div>

<!-- Active -->
<div class="roster-section">

<h2>Active Roster</h2>

<table id="active-roster">

<thead>
<tr>
<th>Builder</th>
<th>Name</th>
<th>Position</th>
<th>NFL Team</th>
<th>Contract</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<!-- Taxi -->
<div class="roster-section">

<h2>Taxi Squad</h2>

<table id="taxi-roster">

<thead>
<tr>
<th>Builder</th>
<th>Name</th>
<th>Position</th>
<th>NFL Team</th>
<th>Contract</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<!-- IR -->
<div class="roster-section">

<h2>IR / Reserve</h2>

<table id="ir-roster">

<thead>
<tr>
<th>Builder</th>
<th>Name</th>
<th>Position</th>
<th>NFL Team</th>
<th>Contract</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script src="roster-builder.js"></script>

</body>
</html>
