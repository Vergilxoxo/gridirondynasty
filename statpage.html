<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Season Leaders</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">
<div class="navbar-container">

<a href="index.html">Home</a>
<a href="players.html">Players</a>
<a href="leaders.html">Leaders</a>

<div class="dropdown">
<button class="dropbtn">League</button>
<div class="dropdown-content">
<a href="standings.html">Standings</a>
<a href="matchups.html">Matchups</a>
</div>
</div>

</div>
</div>

<h1>Season Leaders</h1>

<!-- FILTER -->

<div class="filter-container">

<select id="roster-select" onchange="renderTable()">
<option value="ALL">Alle Manager</option>
<option value="1">Ralf</option>
<option value="2">TitleTownPat</option>
<option value="3">MrNilsson</option>
<option value="4">kleinerlouis</option>
<option value="5">Ulle</option>
<option value="6">TST1860</option>
<option value="7">brab97</option>
<option value="8">Himp84</option>
<option value="9">TobiWalonso</option>
<option value="10">49erflo</option>
<option value="11">Heesy</option>
<option value="12">CrazyGringo</option>
</select>

<select id="positionFilter" onchange="renderTable()">
<option value="ALL">Alle Positionen</option>
<option value="QB">QB</option>
<option value="RB">RB</option>
<option value="WR">WR</option>
<option value="TE">TE</option>
<option value="K">K</option>
<option value="DL">DL</option>
<option value="LB">LB</option>
<option value="DB">DB</option>
</select>

</div>

<div id="status">Lade Daten...</div>

<!-- TABLE -->

<table>

<thead>
<tr>
<th>Rank</th>
<th>Player</th>
<th>Team</th>
<th>Pos</th>
<th>Points</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const leagueId="1207768406841892864";
const seasonWeeks=18;

let leaderboardData=[];
let playersData={};
let playerRoster={};

function normalizePosition(pos){

if(pos==="DE" || pos==="DT") return "DL";
if(pos==="CB" || pos==="S") return "DB";

return pos;

}

async function loadLeaders(){

const status=document.getElementById("status");

status.innerText="Lade Spieler...";

playersData=await fetch("https://api.sleeper.app/v1/players/nfl")
.then(r=>r.json());

let totals={};

for(let week=1;week<=seasonWeeks;week++){

status.innerText="Lade Woche "+week;

try{

const res=await fetch(`https://api.sleeper.app/v1/league/${leagueId}/matchups/${week}`);

if(!res.ok) continue;

const matchups=await res.json();

matchups.forEach(team=>{

const points=team.players_points || {};

for(const playerId in points){

if(!totals[playerId]) totals[playerId]=0;

totals[playerId]+=points[playerId];

playerRoster[playerId]=team.roster_id;

}

});

}catch(e){

console.log("Week error",week);

}

}

leaderboardData=[];

for(const id in totals){

const player=playersData[id];

if(!player) continue;

leaderboardData.push({

name:player.full_name,
team:player.team || "-",
position:normalizePosition(player.position),
points:totals[id],
roster:playerRoster[id]

});

}

leaderboardData.sort((a,b)=>b.points-a.points);

status.innerText="Fertig geladen";

renderTable();

}

function renderTable(){

const posFilter=document.getElementById("positionFilter").value;
const rosterFilter=document.getElementById("roster-select").value;

const table=document.getElementById("tableBody");

table.innerHTML="";

let filtered=leaderboardData;

if(posFilter!=="ALL"){

filtered=filtered.filter(p=>p.position===posFilter);

}

if(rosterFilter!=="ALL"){

filtered=filtered.filter(p=>String(p.roster)===rosterFilter);

}

filtered.slice(0,200).forEach((p,i)=>{

table.innerHTML+=`

<tr>
<td data-label="Rank">${i+1}</td>
<td data-label="Player">${p.name}</td>
<td data-label="Team">${p.team}</td>
<td data-label="Pos">${p.position}</td>
<td data-label="Points">${p.points.toFixed(2)}</td>
</tr>

`;

});

}

window.onload=loadLeaders;

</script>

</body>
</html>
