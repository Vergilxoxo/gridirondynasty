<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Time Single Week Scoring Records</title>
  <!-- Deine CSS-Datei einbinden -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="league-container">
    <div class="league-header">
      <h1>All Time Single Week Scoring Records</h1>
      <p>Top 10 Wochenpunkte aller Zeiten</p>
    </div>

    <div class="records-grid" id="records-grid">
      <!-- Dynamisch hier eingefügt -->
    </div>
  </div>

  <script>
    const leagueIds = {
      "2026":"1311998228123643904",
      "2025":"1207768406841892864",
      "2024":"1042445037713334272"
    };

    // Spielerinformationen von Sleeper
    let allUsers = {};

    async function fetchLeagueUsers(leagueId) {
      const res = await fetch(`https://api.sleeper.app/v1/league/${leagueId}/users`);
      const users = await res.json();
      users.forEach(user => {
        allUsers[user.user_id] = user.display_name || user.username;
      });
    }

    async function fetchTopScores() {
      let records = [];
      for (const year in leagueIds) {
        const leagueId = leagueIds[year];

        // Userdaten abrufen
        await fetchLeagueUsers(leagueId);

        // Matchups abrufen
        const res = await fetch(`https://api.sleeper.app/v1/league/${leagueId}/matchups`);
        const matchups = await res.json();

        matchups.forEach(m => {
          records.push({
            ownerId: m.owner_id || "Unknown",
            points: m.points,
            week: m.week,
            year: year
          });
        });
      }

      // Sortieren nach Punkten absteigend und nur Top 10
      records.sort((a, b) => b.points - a.points);
      return records.slice(0, 10);
    }

    async function renderRecords() {
      const recordsGrid = document.getElementById("records-grid");
      recordsGrid.innerHTML = "<div>Lade Daten...</div>";

      const topScores = await fetchTopScores();
      recordsGrid.innerHTML = "";

      topScores.forEach(record => {
        const ownerName = allUsers[record.ownerId] || "Unknown";
        const card = document.createElement("div");
        card.className = "records-card";
        card.innerHTML = `
          <div class="title">Woche ${record.week}, ${record.year}</div>
          <div class="points">${record.points.toFixed(2)}</div>
          <div class="owner">${ownerName}</div>
        `;
        recordsGrid.appendChild(card);
      });
    }

    // Seite laden
    renderRecords();
  </script>
</body>
</html>
